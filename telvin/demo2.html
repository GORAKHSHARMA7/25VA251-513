<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

  <!-- Background Section -->
  <div class="h-screen bg-[url('https://thf.bing.com/th/id/OIP.ayACpdslq2Oq9hSUQnfMWQHaF1?w=254&h=200&c=7&r=0&o=7&cb=thfc1&dpr=1.3&pid=1.7&rm=3')] bg-cover bg-center flex items-center justify-center">

    <!-- Main Box -->
    <div class="w-[450px] p-8 border-4 border-white rounded-2xl bg-black/40 text-center shadow-2xl">

      <h1 class="text-4xl text-white font-bold mb-4">
        Hello World
      </h1>

      <p class="text-white mb-8">
        Tailwind CSS Background Image Example
      </p>

      <!-- Border Examples -->
      <div class="space-y-4 mb-8">

        <div class="border-2 border-solid border-white p-3 text-white rounded-lg">
          Solid Border
        </div>

        <div class="border-2 border-dashed border-yellow-300 p-3 text-white rounded-lg">
          Dashed Border
        </div>

        <div class="border-2 border-dotted border-pink-300 p-3 text-white rounded-lg">
          Dotted Border
        </div>

        <div class="border-4 border-double border-cyan-300 p-3 text-white rounded-lg">
          Double Border
        </div>

      </div>

      <!-- Bottom Buttons -->
      <div class="flex justify-center gap-4 mt-6">

        <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg">
          Submit
        </button>

        <button class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg">
          Cancel
        </button>

      </div>

    </div>

  </div>


    <!-- Footer -->
  <footer class="bg-black text-white text-center py-4 border-t-4 border-cyan-400">

    <h2 class="text-lg font-semibold">
      Footer Section
    </h2>

    <p class="text-sm mt-1">
      © 2026 Your Website | Made with Tailwind CSS
    </p>

  </footer>


</body>
</html>
