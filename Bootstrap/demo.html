<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Demo</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

    <!-- Header Section -->
   <div class="container-fluid bg-danger text-white py-4">
        <div class="row">
            <div class="col-md-12">
                <h1 class="text-center">
                    💖 Bootstrap 5.3.8 💖
                </h1>
                <p class="text-center">
                    Welcome to your Bootstrap Practice Page
                </p>
            </div>
        </div>
    </div>

    <!-- Content Section -->
    <div class="container mt-5">

        <div class="row">

            <!-- Card 1 -->
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body text-center">
                        <h3 class="card-title">HTML</h3>
                        <p class="card-text">
                            Learn the structure of web pages.
                        </p>
                        <button class="btn btn-primary">
                            Learn More
                        </button>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body text-center">
                        <h3 class="card-title">CSS</h3>
                        <p class="card-text">
                            Style your website beautifully.
                        </p>
                        <button class="btn btn-success">
                            Learn More
                        </button>
                    </div>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body text-center">
                        <h3 class="card-title">Bootstrap</h3>
                        <p class="card-text">
                            Build responsive websites quickly.
                        </p>
                        <button class="btn btn-warning">
                            Learn More
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <div class="container-fluid bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">
            © 2026 Bootstrap Practice Page
        </p>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
