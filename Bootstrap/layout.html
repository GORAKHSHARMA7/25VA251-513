<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Layout</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <div class="container-fluid">
        <div class="row bg-primary text-white text-center p-4">
            <div class="col-lg-12">
                <h1>Header Section</h1>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="container-fluid">
        <div class="row bg-dark text-white text-center p-3">
            <div class="col-lg-12">
                <h2>Navigation Bar</h2>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container-fluid my-2">
        <div class="row" style="height: 350px;">

            <!-- Left Side -->
            <div class="col-lg-4 bg-info d-flex justify-content-center align-items-center">
                <h2>Left</h2>
            </div>

            <!-- Right Side -->
            <div class="col-lg-8">

                <!-- Top Right -->
                <div class="row h-50 bg-danger d-flex justify-content-center align-items-center">
                    <div class="col-lg-12 text-center text-white">
                        <h2>Top Right</h2>
                    </div>
                </div>

                <!-- Bottom Right -->
                <div class="row h-50 bg-success d-flex justify-content-center align-items-center">
                    <div class="col-lg-12 text-center text-white">
                        <h2>Bottom Right</h2>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="container-fluid">
        <div class="row bg-warning text-center p-4">
            <div class="col-lg-12">
                <h2>Footer</h2>
            </div>
        </div>
    </div>

</body>

</html>
